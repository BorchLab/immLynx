# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master]
  pull_request:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,   r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,   r: 'release'}

    timeout-minutes: 90

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Tell basilisk to store environments in a shared, cacheable directory
      BASILISK_USE_SYSTEM_DIR: 1
      # Disable \donttest example execution: basilisk Python env + model
      # downloads are too expensive for CI. Tests cover all functionality.
      _R_CHECK_DONTTEST_EXAMPLES_: false

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - name: Install macOS build dependencies (parasail needs autotools)
        if: runner.os == 'macOS'
        run: brew install automake libtool

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - name: Cache basilisk Python environment
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/R/basilisk
            ~/.local/share/R/basilisk
            ~/Library/Caches/org.R-project.R/R/basilisk
          key: basilisk-${{ runner.os }}-${{ hashFiles('R/basilisk.R') }}
          restore-keys: |
            basilisk-${{ runner.os }}-

      - name: Install package
        run: R CMD INSTALL .

      - name: Pre-build basilisk environment
        run: |
          cat("--- Pre-building immLynxEnv ---\n")
          tryCatch({
            proc <- basilisk::basiliskStart(immLynx:::immLynxEnv)
            basilisk::basiliskStop(proc)
            cat("immLynxEnv: OK\n")
          }, error = function(e) {
            warning("immLynxEnv FAILED: ", conditionMessage(e),
                    "\nPython-dependent tests will be SKIPPED!")
          })
        shell: Rscript {0}

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
